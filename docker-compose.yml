services:
  matomo-db:
    image: ${MARIADB_IMAGE}
    container_name: matomo-db
    restart: unless-stopped
    command:
      - --max_allowed_packet=64M
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - ${VOL_DB_PATH}:/var/lib/mysql
    networks:
      - matomonet
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1g

  matomo-app:
    image: ${MATOMO_IMAGE}
    container_name: matomo-app
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    depends_on:
      matomo-db:
        condition: service_healthy
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: ${DB_PREFIX}
      MATOMO_DATABASE_USERNAME: ${DB_USER}
      MATOMO_DATABASE_PASSWORD: ${DB_PASS}
      MATOMO_DATABASE_DBNAME: ${DB_NAME}
    volumes:
      - ${VOL_MATOMO_DATA}:/var/www/html
    networks:
      - matomonet
      - proxy-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 512m
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy-net
      - traefik.http.routers.matomo.rule=Host(`${MATOMO_HOST}`)
      - traefik.http.routers.matomo.entrypoints=web
      - traefik.http.services.matomo.loadbalancer.server.port=80
      - traefik.http.middlewares.matomo-forwarded-https.headers.customrequestheaders.X-Forwarded-Proto=${MATOMO_PROXY_FORWARDED_PROTO:-https}
      - traefik.http.middlewares.matomo-forwarded-port.headers.customrequestheaders.X-Forwarded-Port=${MATOMO_PROXY_FORWARDED_PORT:-443}
      - traefik.http.middlewares.matomo-tracker-rewrite-app.replacepathregex.regex=^/js/app\\.js$
      - traefik.http.middlewares.matomo-tracker-rewrite-app.replacepathregex.replacement=/matomo.js
      - traefik.http.middlewares.matomo-tracker-rewrite-ping.replacepathregex.regex=^/js/ping$
      - traefik.http.middlewares.matomo-tracker-rewrite-ping.replacepathregex.replacement=/matomo.php
      - traefik.http.routers.matomo.middlewares=matomo-forwarded-https,matomo-forwarded-port,matomo-tracker-rewrite-app,matomo-tracker-rewrite-ping

  matomo-cron:
    image: ${CRON_IMAGE}
    container_name: matomo-cron
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    depends_on:
      matomo-db:
        condition: service_healthy
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: ${DB_PREFIX}
      MATOMO_DATABASE_USERNAME: ${DB_USER}
      MATOMO_DATABASE_PASSWORD: ${DB_PASS}
      MATOMO_DATABASE_DBNAME: ${DB_NAME}
    working_dir: /var/www/html
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          php /var/www/html/console core:archive --url="https://${MATOMO_HOST}";
          sleep 3600;
        done
    volumes:
      - ${VOL_MATOMO_DATA}:/var/www/html
    networks:
      - matomonet
    mem_limit: 256m

networks:
  matomonet:
    driver: bridge
    internal: true
  proxy-net:
    external: true
