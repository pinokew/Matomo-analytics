name: CI Checks

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Hadolint on Dockerfiles (if present)
        run: |
          set -euo pipefail
          files=$(find . -type f \( -name 'Dockerfile' -o -name '*.Dockerfile' \) | tr '\n' ' ')
          if [ -z "$files" ]; then
            echo "No Dockerfiles found, skipping hadolint"
            exit 0
          fi
          docker run --rm -i hadolint/hadolint < $(echo "$files" | awk '{print $1}')

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-and-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file for compose validation
        run: cp .env.example .env

      - name: Validate compose config
        run: docker compose -f docker-compose.yaml config --quiet

      - name: Check ports policy
        run: ./scripts/check-ports-policy.sh docker-compose.yaml
