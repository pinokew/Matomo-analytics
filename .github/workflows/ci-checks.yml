name: CI Checks

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'
    paths-ignore:
      - '**/*.md'
      - '.env.example'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '.env.example'

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Run Hadolint on Dockerfiles (if present)
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f \( -name 'Dockerfile' -o -name '*.Dockerfile' \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Dockerfiles found, skipping hadolint"
            exit 0
          fi
          for file in "${files[@]}"; do
            echo "Linting $file"
            docker run --rm -i hadolint/hadolint:latest hadolint - < "$file"
          done

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare env file for compose validation
        run: cp .env.example .env

      - name: Validate compose config
        run: docker compose -f docker-compose.yaml config --quiet

      - name: Check ports policy
        run: bash ./scripts/check-ports-policy.sh docker-compose.yaml

  cd-deploy:
    name: cd-deploy
    needs: ci-checks
    if: |
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/tags/v')
      )) ||
      (github.event_name == 'pull_request' &&
        github.base_ref == 'main' &&
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Validate required secrets
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          for key in TS_OAUTH_CLIENT_ID TS_OAUTH_SECRET SERVER_HOST SERVER_USER SERVER_SSH_KEY; do
            if [[ -z "${!key:-}" ]]; then
              echo "ERROR: required secret is missing: $key"
              exit 1
            fi
          done

      - name: Configure SSH key
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          umask 177
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Connect to Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy on remote host
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PROJECT_DIR: ${{ secrets.DEPLOY_PROJECT_DIR }}
          DEPLOY_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          target_path="${DEPLOY_PROJECT_DIR}"

          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" \
            "DEPLOY_REF='${DEPLOY_REF}' DEPLOY_PROJECT_DIR='${target_path}' bash -s" <<'EOF'
          set -euo pipefail
          if [[ -z "${DEPLOY_PROJECT_DIR:-}" ]]; then
            echo "ERROR: DEPLOY_PROJECT_DIR is empty"
            exit 1
          fi
          if [[ ! -d "$DEPLOY_PROJECT_DIR/.git" ]]; then
            echo "ERROR: DEPLOY_PROJECT_DIR is not a git repository: $DEPLOY_PROJECT_DIR"
            exit 1
          fi
          cd "$DEPLOY_PROJECT_DIR"
          git fetch --all --prune
          git checkout "$DEPLOY_REF"
          bash ./scripts/verify-env.sh .env
          bash ./scripts/init-volumes.sh .env
          docker compose -f docker-compose.yaml up -d --remove-orphans
          bash ./scripts/apply-matomo-config.sh .env
          docker compose -f docker-compose.yaml ps
          EOF

