name: CI Checks

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Run Hadolint on Dockerfiles (if present)
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f \( -name 'Dockerfile' -o -name '*.Dockerfile' \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Dockerfiles found, skipping hadolint"
            exit 0
          fi
          for file in "${files[@]}"; do
            echo "Linting $file"
            docker run --rm -i hadolint/hadolint:latest hadolint - < "$file"
          done

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare env file for compose validation
        run: cp .env.example .env

      - name: Validate compose config
        run: docker compose -f docker-compose.yaml config --quiet

      - name: Check ports policy
        run: bash ./scripts/check-ports-policy.sh docker-compose.yaml

  cd-deploy:
    name: cd-deploy
    needs: ci-checks
    if: |
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/tags/v')
      )) ||
      (github.event_name == 'pull_request' &&
        github.base_ref == 'main' &&
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Validate required secrets
        env:
          TAILSCALE_EPHEMERAL_AUTH_KEY: ${{ secrets.TAILSCALE_EPHEMERAL_AUTH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          for key in TAILSCALE_EPHEMERAL_AUTH_KEY SERVER_HOST SERVER_USER SERVER_SSH_KEY; do
            if [[ -z "${!key:-}" ]]; then
              echo "ERROR: required secret is missing: $key"
              exit 1
            fi
          done

      - name: Configure SSH key
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          umask 177
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Install Tailscale
        run: |
          set -euo pipefail
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailnet
        env:
          TAILSCALE_EPHEMERAL_AUTH_KEY: ${{ secrets.TAILSCALE_EPHEMERAL_AUTH_KEY }}
        run: |
          set -euo pipefail
          TS_SOCKET="/var/run/tailscale/tailscaled.sock"

          sudo systemctl start tailscaled

          ready=0
          for _ in $(seq 1 40); do
            if sudo tailscale --socket="$TS_SOCKET" status >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 1
          done

          if [[ "$ready" -ne 1 ]]; then
            echo "ERROR: tailscaled socket is not ready: $TS_SOCKET"
            sudo systemctl status tailscaled --no-pager || true
            sudo journalctl -u tailscaled -n 100 --no-pager || true
            sudo tail -n 100 /tmp/tailscaled.log || true
            exit 1
          fi

          if ! sudo tailscale --socket="$TS_SOCKET" up \
            --authkey "$TAILSCALE_EPHEMERAL_AUTH_KEY" \
            --accept-routes=true \
            --accept-dns=false \
            --hostname "gha-matomo-${{ github.run_id }}"; then
            echo "ERROR: tailscale up failed."
            echo "HINT: your tailnet policy/auth key may require hardware attestation, which is unavailable on GitHub-hosted runners (no TPM)."
            echo "Use a CI-specific auth key/policy without mandatory hardware attestation, or run deploy on a self-hosted runner with TPM support."
            sudo journalctl -u tailscaled -n 100 --no-pager || true
            exit 1
          fi

          sudo tailscale --socket="$TS_SOCKET" status

      - name: Deploy on remote host
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PROJECT_DIR: ${{ vars.DEPLOY_PROJECT_DIR }}
          DEPLOY_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          target_path="${DEPLOY_PROJECT_DIR:-/home/pinokew/Matomo-analytics}"

          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" \
            "DEPLOY_REF='${DEPLOY_REF}' DEPLOY_PROJECT_DIR='${target_path}' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PROJECT_DIR"
          git fetch --all --prune
          git checkout "$DEPLOY_REF"
          bash ./scripts/verify-env.sh .env
          bash ./scripts/init-volumes.sh .env
          docker compose -f docker-compose.yaml up -d --remove-orphans
          bash ./scripts/apply-matomo-config.sh .env
          docker compose -f docker-compose.yaml ps
          EOF

      - name: Disconnect Tailscale
        if: always()
        run: |
          sudo tailscale --socket=/var/run/tailscale/tailscaled.sock down || true
