name: CI Checks

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'
    paths-ignore:
      - '**/*.md'
      - '.env.example'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '.env.example'
      - '.gitignore'

permissions:
  contents: read
  packages: read

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ci-checks-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Run Hadolint on Dockerfiles (if present)
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f \( -name 'Dockerfile' -o -name '*.Dockerfile' \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Dockerfiles found, skipping hadolint"
            exit 0
          fi
          for file in "${files[@]}"; do
            echo "Linting $file"
            docker run --rm -i hadolint/hadolint:latest hadolint - < "$file"
          done

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare env file for compose validation
        run: cp .env.example .env

      - name: Validate compose config
        run: docker compose -f docker-compose.yaml config --quiet

      - name: Check ports policy
        run: bash ./scripts/check-ports-policy.sh docker-compose.yaml

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4

  trivy-scan:
    name: trivy-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 1

  cd-deploy:
    name: cd-deploy
    needs: [ci-checks, trivy-scan]
    if: |
      github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        startsWith(github.ref, 'refs/tags/v')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: cd-deploy-production
      cancel-in-progress: false
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Validate required secrets
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_HOST_KEY_PUB: ${{ secrets.SSH_HOST_KEY_PUB }}
        run: |
          set -euo pipefail
          for key in TS_OAUTH_CLIENT_ID TS_OAUTH_SECRET SERVER_HOST SERVER_USER SERVER_SSH_KEY SSH_HOST_KEY_PUB; do
            if [[ -z "${!key:-}" ]]; then
              echo "ERROR: required secret is missing: $key"
              exit 1
            fi
          done

      - name: Configure SSH key and known_hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_HOST_KEY_PUB: ${{ secrets.SSH_HOST_KEY_PUB }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          umask 177
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s %s\n' "$SERVER_HOST" "$SSH_HOST_KEY_PUB" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Connect to Tailscale
        uses: tailscale/github-action@main
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy on remote host
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PROJECT_DIR: ${{ secrets.DEPLOY_PROJECT_DIR }}
          DEPLOY_REF: ${{ github.sha }}
        run: |
          set -euo pipefail
          target_path="${DEPLOY_PROJECT_DIR}"

          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${SERVER_USER}@${SERVER_HOST}" \
            "DEPLOY_REF='${DEPLOY_REF}' DEPLOY_PROJECT_DIR='${target_path}' bash -s" <<'EOF'
          set -euo pipefail
          if [[ -z "${DEPLOY_PROJECT_DIR:-}" ]]; then
            echo "ERROR: DEPLOY_PROJECT_DIR is empty"
            exit 1
          fi
          if [[ ! -d "$DEPLOY_PROJECT_DIR/.git" ]]; then
            echo "ERROR: DEPLOY_PROJECT_DIR is not a git repository: $DEPLOY_PROJECT_DIR"
            exit 1
          fi
          cd "$DEPLOY_PROJECT_DIR"
          git fetch --all --prune
          git checkout "$DEPLOY_REF"
          bash ./scripts/verify-env.sh .env
          bash ./scripts/init-volumes.sh .env
          docker compose -f docker-compose.yaml up -d --remove-orphans
          bash ./scripts/apply-matomo-config.sh .env
          docker compose -f docker-compose.yaml ps
          EOF
